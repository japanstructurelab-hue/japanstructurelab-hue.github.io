<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>構造学プロンプトOS｜調整中 - Japan Structure Lab</title>
<meta name="description" content="構造学プロンプトOSは現在、精度の検証中です。">
<meta name="robots" content="noindex">
<style>
  :root{
    --bg:#0b0b0d;
    --gold:#c6a15b;
    --ivory:#e8e2d5;
    --muted:#8f887a;
    --rule:#26221e;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ivory);
    font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2rem 1.5rem;
    line-height:1.9;
  }
  main{max-width:34rem;width:100%;}
  .eyebrow{
    font-size:.72rem;
    letter-spacing:.18em;
    color:var(--gold);
    margin:0 0 1rem;
  }
  h1{
    font-family:"Yu Mincho","Hiragino Mincho ProN","Noto Serif JP",serif;
    font-weight:500;
    font-size:1.6rem;
    letter-spacing:.04em;
    margin:0 0 1.6rem;
    color:#f2ecdf;
  }
  .rule{
    height:1px;
    background:var(--rule);
    border:0;
    margin:0 0 1.6rem;
  }
  p{
    margin:0 0 1rem;
    font-size:.94rem;
    color:#c9c2b3;
  }
  .back{
    display:inline-block;
    margin-top:1.4rem;
    font-size:.86rem;
    color:var(--gold);
    text-decoration:none;
    border-bottom:1px solid rgba(198,161,91,.35);
    padding-bottom:2px;
  }
  .back:hover,.back:focus-visible{border-bottom-color:var(--gold);}
  .back:focus-visible{outline:2px solid var(--gold);outline-offset:4px;}
  @media (max-width:480px){
    h1{font-size:1.35rem;}
  }
</style>
</head>
<body>
<main>
  <p class="eyebrow">JAPAN STRUCTURE LAB ／ TOOL 04</p>
  <h1>構造学プロンプトOSは、精度の検証中です</h1>
  <hr class="rule">
  <p>記事を数えて構成比を示す道具です。数え方そのものに揺れが見つかったため、いまは公開を止めて検証しています。</p>
  <p>検証が終わり次第、このページで再公開します。</p>
  <a class="back" href="../">ラボのトップへ戻る</a>
</main>
</body>
</html>
